# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
# Uncomment the following line to enable the Corne OLED Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
# WPM widget temporarily disabled for battery drain testing (its periodic
# display refresh may prevent deep sleep). Re-enable once drain is diagnosed:
# CONFIG_ZMK_WIDGET_WPM_STATUS=y
# Peripheral battery reporting temporarily disabled for battery drain testing
# (periodic BLE wake to poll peripheral battery may prevent deep sleep).
# Re-enable once drain is diagnosed:
# CONFIG_BT_BAS=y
# CONFIG_ZMK_BATTERY_REPORTING=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
# Configuration for entering low power states when the keyboard is idle.
CONFIG_ZMK_IDLE_TIMEOUT=15000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_USB_BOOT=y
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n